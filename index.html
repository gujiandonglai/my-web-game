<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>东来游戏馆</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:"Microsoft YaHei",sans-serif;
    min-height:100vh;
}

header{
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    color:#94a3b8;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin-bottom:60px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:25px;
    transition:0.3s;
    border:1px solid #334155;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#38bdf8;
}

.card h2{
    margin-bottom:15px;
}

.card p{
    color:#cbd5e1;
    margin-bottom:20px;
    line-height:1.6;
}

.play-btn{
    display:inline-block;
    padding:12px 24px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.play-btn:hover{
    background:#0ea5e9;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

</style>
</head>

<body>

<header>
    <h1>⚽ 东来游戏馆</h1>
    <p>一个关于足球与梦想的小游戏集合</p>
</header>

<div class="container">

    <div class="game-grid">

        <div class="card">
            <h2>⚽ 足球经理人V2</h2>
            <p>
                从低级别联赛开始，
                建立属于自己的足球王朝。
            </p>

            <a class="play-btn"
               href="足球俱乐部经理v2.html">
                开始游戏
            </a>
        </div>

        <div class="card">
            <h2>🥅 街头足球</h2>
            <p>
                在狭窄街道中展开激烈对决，
                体验最纯粹的足球快乐。
            </p>

            <a class="play-btn"
               href="street_football.html">
                开始游戏
            </a>
        </div>

        <div class="card">
            <h2>🏆 Football Async</h2>
            <p>
                文字驱动与模拟经营结合，
                挑战成为传奇教练。
            </p>

            <a class="play-btn"
               href="football_async.html">
                开始游戏
            </a>
        </div>

    </div>

</div>

<footer>
    © 2026 东来游戏馆
</footer>

</body>
</html>
